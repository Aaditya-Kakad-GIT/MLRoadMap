<html lang="en">

<title>ML Roadmap — Revised Edition // Adi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0F2235;
    --navy-deep:#091827;
    --navy-soft:#183351;
    --paper:#ECEEE7;
    --paper-dim:#D8DCD2;
    --ink:#14202B;
    --ink-soft:#3C4A56;
    --accent:#0D9488;
    --accent-dim:#0A7870;
    --accent-light:rgba(13,148,136,0.14);
    --line:rgba(255,255,255,0.10);
    --line-soft:rgba(20,32,43,0.14);
    --green:#16A34A;
    --amber:#D97706;
    --red:#C75450;
    --violet:#7C3AED;
    --gray:#7A90A0;
    --font-display:'Space Grotesk', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
    --font-body:'Inter', sans-serif;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }

  body{
    background-color:var(--navy);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:28px 28px;
    color:var(--paper);
    font-family:var(--font-body);
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  .app-shell{ max-width:900px; margin:0 auto; padding:36px 24px 72px; }
  h1,h2,h3{ font-family:var(--font-display); margin:0; }
  button{ font-family:var(--font-body); cursor:pointer; }
  input, textarea{ font-family:var(--font-body); }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  /* ── progress ── */
  .progress-track{ flex:1; height:7px; background:rgba(255,255,255,0.09); border-radius:5px; overflow:hidden; min-width:80px; }
  .progress-fill{ height:100%; background:var(--accent); border-radius:5px; transition:width 0.35s ease; }
  .progress-fill.green{ background:var(--green); }
  .progress-fill.violet{ background:var(--violet); }

  /* ── title block ── */
  .titleblock{ border:1px solid var(--line); background:var(--navy-deep); border-radius:8px; padding:20px 22px; margin-bottom:16px; }
  .rev-badge{ display:inline-block; font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:0.08em; background:var(--accent); color:#fff; padding:2px 7px; border-radius:3px; margin-bottom:10px; }
  .tb-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:14px 18px; padding-bottom:16px; border-bottom:1px solid var(--line); }
  .tb-cell{ display:flex; flex-direction:column; gap:3px; }
  .tb-label{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--gray); }
  .tb-value{ font-family:var(--font-display); font-weight:600; font-size:15px; color:var(--paper); }
  .tb-progress-row{ display:flex; align-items:center; gap:12px; margin-top:16px; }
  .tb-progress-label{ font-family:var(--font-mono); font-size:11px; color:var(--gray); white-space:nowrap; }
  .tb-progress-text{ font-family:var(--font-mono); font-size:12px; color:var(--paper); white-space:nowrap; }
  .tb-note{ margin:12px 0 0; font-size:12.5px; color:var(--gray); line-height:1.55; }
  .tb-note strong{ color:var(--accent); }

  /* ── panels ── */
  .panel{ background:var(--paper); color:var(--ink); border-radius:8px; padding:20px 22px; margin-bottom:16px; border-left:4px solid var(--accent); }
  .panel.green-border{ border-left-color:var(--green); }
  .panel.violet-border{ border-left-color:var(--violet); }
  .eyebrow{ display:block; font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.10em; text-transform:uppercase; color:var(--accent-dim); margin-bottom:8px; }

  /* ── this week panel ── */
  .thisweek h2{ font-size:20px; color:var(--ink); margin-bottom:8px; }
  .thisweek.complete{ border-left-color:var(--green); }
  .thisweek-tags{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  .tag{ font-family:var(--font-mono); font-size:11.5px; background:var(--paper-dim); color:var(--ink-soft); padding:3px 8px; border-radius:4px; }
  .tag.new-tag{ background:rgba(124,58,237,0.12); color:var(--violet); border:1px solid rgba(124,58,237,0.25); }
  .deliverable{ font-size:13.5px; color:var(--ink-soft); margin:0 0 14px; }
  .thisweek-bottom{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .mini-stat{ font-family:var(--font-mono); font-size:12.5px; color:var(--ink-soft); }

  /* ── badges ── */
  .badge{ font-family:var(--font-mono); font-size:11px; padding:3px 9px; border-radius:20px; white-space:nowrap; }
  .badge.st-ontrack{ background:rgba(22,163,74,0.15); color:#166534; }
  .badge.st-behind{ background:rgba(217,119,6,0.15); color:#92400E; }
  .badge.st-skipped{ background:rgba(199,84,80,0.15); color:#9B1C1C; }
  .badge.st-none{ background:rgba(20,32,43,0.07); color:var(--gray); }

  /* ── buttons ── */
  .btn-primary{ border:none; background:var(--ink); color:var(--paper); font-size:13px; font-weight:600; padding:9px 16px; border-radius:5px; margin-left:auto; transition:background 0.15s ease; }
  .btn-primary:hover{ background:var(--accent-dim); }
  .btn-secondary{ border:1px solid var(--ink); background:transparent; color:var(--ink); font-size:12.5px; font-weight:600; padding:7px 14px; border-radius:5px; }
  .btn-secondary:hover{ background:var(--ink); color:var(--paper); }

  /* ── DSA parallel track ── */
  .dsa-panel{ background:var(--paper); color:var(--ink); border-radius:8px; padding:18px 20px; margin-bottom:16px; display:grid; grid-template-columns:1fr 1fr; gap:16px; border-left:4px solid var(--green); }
  .dsa-col{ display:flex; flex-direction:column; gap:8px; }
  .dsa-col + .dsa-col{ border-left:1px solid var(--line-soft); padding-left:16px; }
  .dsa-label{ font-family:var(--font-mono); font-size:10px; letter-spacing:0.10em; text-transform:uppercase; color:var(--green); margin-bottom:2px; }
  .dsa-controls{ display:flex; align-items:center; gap:8px; }
  .step-btn{ width:28px; height:28px; border:1px solid var(--line-soft); background:#fff; color:var(--ink); border-radius:5px; font-size:15px; line-height:1; }
  .step-btn:hover{ background:var(--paper-dim); }
  .num-input{ width:64px; text-align:center; font-family:var(--font-mono); font-size:15px; font-weight:600; border:1px solid var(--line-soft); border-radius:5px; padding:5px 4px; background:#fff; color:var(--ink); }
  .dsa-target{ font-family:var(--font-mono); font-size:12px; color:var(--ink-soft); }
  .dsa-note{ font-size:12px; color:var(--ink-soft); line-height:1.5; }

  /* ── phase sections ── */
  .phase-section{ margin-top:28px; margin-bottom:12px; }
  .phase-header{ display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:8px; border-bottom:1px solid var(--line); padding-bottom:10px; }
  .phase-heading{ display:flex; align-items:baseline; gap:10px; }
  .phase-code{ font-family:var(--font-mono); font-size:11.5px; letter-spacing:0.06em; color:var(--accent); }
  .phase-header h3{ font-size:18px; color:var(--paper); }
  .phase-time{ font-family:var(--font-mono); font-size:12px; color:var(--gray); }
  .phase-goal{ font-size:13px; color:var(--gray); max-width:660px; margin:10px 0 12px; line-height:1.55; }
  .phase-progress-row{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .phase-progress-text{ font-family:var(--font-mono); font-size:11.5px; color:var(--gray); white-space:nowrap; }

  /* ── exit panel ── */
  .exit-toggle{ display:inline-block; background:none; border:1px solid var(--line); color:var(--paper); font-size:12px; padding:6px 12px; border-radius:5px; margin-bottom:6px; }
  .exit-toggle:hover{ border-color:var(--accent); }
  .exit-panel{ display:none; margin:10px 0 16px; padding:14px 16px; background:var(--navy-deep); border:1px solid var(--line); border-radius:6px; }
  .exit-panel.open{ display:block; }
  .exit-item{ display:flex; align-items:flex-start; gap:10px; padding:6px 0; font-size:13px; color:var(--paper); }
  .exit-item input{ margin-top:3px; flex-shrink:0; width:16px; height:16px; accent-color:var(--accent); }

  /* ── entry cards ── */
  .entry-list{ display:flex; flex-direction:column; gap:10px; }
  .entry{ background:var(--paper); color:var(--ink); border-radius:7px; overflow:hidden; border:1px solid transparent; }
  .entry.open{ border-color:var(--accent); }
  .entry-header{ display:flex; align-items:center; gap:14px; padding:13px 16px; cursor:pointer; }
  .entry-header:hover{ background:rgba(0,0,0,0.02); }
  .entry-code{ font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--accent-dim); flex-shrink:0; width:64px; }
  .entry-titlewrap{ flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
  .entry-date{ font-family:var(--font-mono); font-size:11px; color:var(--ink-soft); }
  .entry-title{ font-family:var(--font-display); font-weight:600; font-size:14.5px; color:var(--ink); }
  .now-tag{ font-family:var(--font-mono); font-size:9.5px; background:var(--accent); color:#fff; padding:2px 6px; border-radius:3px; margin-left:6px; letter-spacing:0.04em; vertical-align:middle; }
  .new-feature-tag{ font-family:var(--font-mono); font-size:9px; background:rgba(124,58,237,0.15); color:var(--violet); border:1px solid rgba(124,58,237,0.3); padding:2px 5px; border-radius:3px; margin-left:5px; vertical-align:middle; }
  .chevron{ font-size:18px; color:var(--ink-soft); transition:transform 0.2s ease; flex-shrink:0; }
  .entry.open .chevron{ transform:rotate(90deg); }
  .entry-body{ display:none; padding:0 18px 18px; }
  .entry.open .entry-body{ display:block; }
  .entry-note{ font-size:12.5px; font-style:italic; border-left:3px solid var(--accent); padding-left:10px; background:rgba(13,148,136,0.06); padding:8px 10px; border-radius:0 5px 5px 0; margin:0 0 12px; color:var(--ink-soft); }
  .entry-note.warn{ border-left-color:var(--violet); background:rgba(124,58,237,0.06); }
  .entry-deliverable{ font-size:13px; color:var(--ink-soft); margin:0 0 12px; }

  /* ── task list ── */
  .task-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
  .task-item{ display:flex; align-items:flex-start; gap:10px; font-size:13.5px; }
  .task-item input{ margin-top:3px; flex-shrink:0; width:17px; height:17px; accent-color:var(--accent); }
  .task-item span.new-item{ color:var(--violet); font-style:italic; }
  .task-progress{ font-family:var(--font-mono); font-size:11.5px; color:var(--ink-soft); margin:0 0 16px; }

  /* ── check-in ── */
  .checkin{ border-top:1px solid var(--line-soft); padding-top:14px; }
  .checkin-label{ display:block; font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--gray); margin-bottom:8px; }
  .pill-group{ display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .pill{ border:1px solid var(--line-soft); background:#fff; color:var(--ink-soft); font-size:12.5px; padding:6px 13px; border-radius:20px; cursor:pointer; }
  .pill:hover{ border-color:var(--accent); }
  .pill.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  textarea[data-action="notes"]{ width:100%; min-height:64px; resize:vertical; border:1px solid var(--line-soft); border-radius:5px; padding:9px 11px; font-size:13px; color:var(--ink); background:#fff; margin-bottom:10px; }
  .save-row{ display:flex; align-items:center; gap:10px; }
  .saved-msg{ font-family:var(--font-mono); font-size:11.5px; color:var(--green); opacity:0; transition:opacity 0.2s ease; }
  .saved-msg.show{ opacity:1; }

  /* ── footer ── */
  .footer-row{ display:flex; justify-content:space-between; align-items:center; margin-top:32px; padding-top:16px; border-top:1px solid var(--line); }
  .save-status{ font-family:var(--font-mono); font-size:11.5px; color:var(--gray); }
  .reset-btn{ background:none; border:1px solid var(--line); color:var(--gray); font-size:12px; padding:7px 13px; border-radius:5px; }
  .reset-btn:hover{ border-color:var(--red); color:var(--red); }
  .loading-note{ font-family:var(--font-mono); font-size:13px; color:var(--gray); padding:40px 0; text-align:center; }

  /* ── responsive ── */
  @media (max-width:640px){
    .app-shell{ padding:20px 14px 56px; }
    .tb-grid{ grid-template-columns:repeat(2, 1fr); }
    .dsa-panel{ grid-template-columns:1fr; }
    .dsa-col + .dsa-col{ border-left:none; border-top:1px solid var(--line-soft); padding-left:0; padding-top:12px; }
    .entry-header{ flex-wrap:wrap; }
    .entry-code{ width:auto; }
  }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>

/* ────────────────────────────────
   SCHEDULE BUILDER
────────────────────────────────── */
function addDays(d, n){ var r=new Date(d.getTime()); r.setDate(r.getDate()+n); return r; }
function pad2(n){ return n<10?('0'+n):(''+n); }
function fmtDate(d){ return pad2(d.getDate())+' '+MONTHS[d.getMonth()]+' '+d.getFullYear(); }
function fmtShort(d){ return pad2(d.getDate())+' '+MONTHS[d.getMonth()]; }
function fmtRange(s,e){ if(s.getFullYear()===e.getFullYear()) return fmtShort(s)+' \u2013 '+fmtShort(e)+' '+e.getFullYear(); return fmtDate(s)+' \u2013 '+fmtDate(e); }
function todayMid(){ var t=new Date(); t.setHours(0,0,0,0); return t; }

function buildSchedule(){
  var off=0, out=[];
  for(var i=0;i<ENTRIES_RAW.length;i++){
    var raw=ENTRIES_RAW[i];
    var s=addDays(START_DATE,off), e=addDays(s,raw.days-1);
    off+=raw.days;
    var wl=raw.weekNums.length>1?('Weeks '+raw.weekNums[0]+'\u2013'+raw.weekNums[raw.weekNums.length-1]):('Week '+raw.weekNums[0]);
    var cl=raw.weekNums.length>1?('W'+pad2(raw.weekNums[0])+'\u2013'+pad2(raw.weekNums[raw.weekNums.length-1])):('W'+pad2(raw.weekNums[0]));
    out.push(Object.assign({},raw,{start:s,end:e,weekLabel:wl,codeLabel:cl}));
  }
  return out;
}

function findCurrent(entries, today){
  for(var i=0;i<entries.length;i++) if(today.getTime()>=entries[i].start.getTime()&&today.getTime()<=entries[i].end.getTime()) return entries[i];
  if(today.getTime()<entries[0].start.getTime()) return entries[0];
  return null;
}

/* ────────────────────────────────
   STATE
────────────────────────────────── */
function defaultState(){
  var tasks={}, checkins={}, phaseExit={};
  ENTRIES_RAW.forEach(function(e){ tasks[e.id]=e.tasks.map(function(){return false;}); checkins[e.id]={status:null,notes:'',savedAt:null}; });
  PHASES.forEach(function(p){ phaseExit[p.id]=p.exit.map(function(){return false;}); });
  return{tasks:tasks,checkins:checkins,phaseExit:phaseExit,leetcode:0,hackerrank:0};
}

function hydrateState(raw){
  var base=defaultState();
  if(!raw||typeof raw!=='object') return base;
  ENTRIES_RAW.forEach(function(e){
    if(raw.tasks&&raw.tasks[e.id]!=null) for(var i=0;i<base.tasks[e.id].length;i++) base.tasks[e.id][i]=!!(Array.isArray(raw.tasks[e.id])?raw.tasks[e.id][i]:raw.tasks[e.id][String(i)]);
    if(raw.checkins&&raw.checkins[e.id]){ var c=raw.checkins[e.id]; base.checkins[e.id]={status:c.status||null,notes:typeof c.notes==='string'?c.notes:'',savedAt:c.savedAt||null}; }
  });
  PHASES.forEach(function(p){ if(raw.phaseExit&&raw.phaseExit[p.id]!=null) for(var i=0;i<base.phaseExit[p.id].length;i++) base.phaseExit[p.id][i]=!!(Array.isArray(raw.phaseExit[p.id])?raw.phaseExit[p.id][i]:raw.phaseExit[p.id][String(i)]); });
  base.leetcode=(typeof raw.leetcode==='number'&&raw.leetcode>=0)?raw.leetcode:0;
  base.hackerrank=(typeof raw.hackerrank==='number'&&raw.hackerrank>=0)?raw.hackerrank:0;
  return base;
}

/* ────────────────────────────────
   PROGRESS
────────────────────────────────── */
function calcEntry(id, state){ var a=state.tasks[id]||[]; return{done:a.filter(Boolean).length,total:a.length}; }
function calcPhase(pid, entries, state){ var d=0,t=0; entries.forEach(function(e){if(e.phase===pid){var p=calcEntry(e.id,state);d+=p.done;t+=p.total;}}); return{done:d,total:t}; }
function calcOverall(entries, state){ var d=0,t=0; entries.forEach(function(e){var p=calcEntry(e.id,state);d+=p.done;t+=p.total;}); return{done:d,total:t}; }
function pct(d,t){ return t>0?Math.round((d/t)*100):0; }
function statusMeta(s){ if(s==='ontrack') return{label:'On track',cls:'st-ontrack'}; if(s==='behind') return{label:'Behind',cls:'st-behind'}; if(s==='skipped') return{label:'Skipped',cls:'st-skipped'}; return{label:'No check-in',cls:'st-none'}; }
function phaseForEntry(id, entries){ for(var i=0;i<entries.length;i++) if(entries[i].id===id) return entries[i].phase; return null; }
function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];}); }

    '<div class="entry-titlewrap"><span class="entry-date">'+fmtRange(entry.start,entry.end)+'</span>'+
    '<span class="entry-title">'+esc(entry.title)+' '+curTag+newTag+'</span></div>'+
    '<span class="badge '+meta.cls+'" id="badge_'+entry.id+'">'+meta.label+'</span>'+
    '<span class="chevron" aria-hidden="true">\u203a</span></div>'+
    '<div class="entry-body">'+noteHtml+
    '<p class="entry-deliverable">Deliverable: '+esc(entry.deliverable)+'</p>'+
    '<div class="task-list">'+tasksHtml+'</div>'+
    '<p class="task-progress" id="taskprog_'+entry.id+'">'+prog.done+'/'+prog.total+' tasks done</p>'+
    '<div class="checkin"><span class="checkin-label">Weekly check-in</span>'+
    '<div class="pill-group">'+
    '<button class="pill'+(checkin.status==='ontrack'?' active':'')+'" type="button" data-action="status" data-entry="'+entry.id+'" data-status="ontrack">On track</button>'+
    '<button class="pill'+(checkin.status==='behind'?' active':'')+'" type="button" data-action="status" data-entry="'+entry.id+'" data-status="behind">Behind</button>'+
    '<button class="pill'+(checkin.status==='skipped'?' active':'')+'" type="button" data-action="status" data-entry="'+entry.id+'" data-status="skipped">Skipped</button>'+
    '</div><textarea data-action="notes" data-entry="'+entry.id+'" id="notes_'+entry.id+'" placeholder="What happened this week? What blocked you, what changes next week?">'+esc(checkin.notes)+'</textarea>'+
    '<div class="save-row"><button class="btn-secondary" type="button" data-action="save-checkin" data-entry="'+entry.id+'">Save check-in</button>'+
    '<span class="saved-msg" id="savedmsg_'+entry.id+'"></span></div></div></div></div>';
}

function renderPhase(phase, entries, state, cur){
  var phEntries=entries.filter(function(e){return e.phase===phase.id;});
  var prog=calcPhase(phase.id,entries,state);
  var exitHtml=phase.exit.map(function(item,idx){
    return '<label class="exit-item"><input type="checkbox" data-action="exit" data-phase="'+phase.id+'" data-idx="'+idx+'"'+(state.phaseExit[phase.id][idx]?' checked="checked"':'')+' /><span>'+esc(item)+'</span></label>';
  }).join('');
  var entriesHtml=phEntries.map(function(e){return renderEntry(e,state,!!(cur&&cur.id===e.id));}).join('');
  return '<section class="phase-section">'+
    '<div class="phase-header"><div class="phase-heading"><span class="phase-code">'+phase.code+'</span><h3>'+esc(phase.name)+'</h3></div>'+
    '<span class="phase-time">'+esc(phase.dailyTime)+'</span></div>'+
    '<p class="phase-goal">'+esc(phase.goal)+'</p>'+
    '<div class="phase-progress-row"><div class="progress-track"><div class="progress-fill" id="phasefill_'+phase.id+'" style="width:'+pct(prog.done,prog.total)+'%"></div></div>'+
    '<span class="phase-progress-text" id="phasetext_'+phase.id+'">'+prog.done+'/'+prog.total+' tasks</span></div>'+
    '<button class="exit-toggle" type="button" data-action="toggle-exit" data-phase="'+phase.id+'" aria-expanded="false">View phase exit checklist \u25be</button>'+
    '<div class="exit-panel" id="exitpanel_'+phase.id+'">'+exitHtml+'</div>'+
    '<div class="entry-list">'+entriesHtml+'</div></section>';
}

function renderFooter(){
  return '<div class="footer-row"><span class="save-status" id="savestatus">Loaded</span><button class="reset-btn" type="button" data-action="reset">Reset all progress</button></div>';
}

function renderApp(entries, state){
  var today=todayMid(), cur=findCurrent(entries,today);
  var html=renderTitle(entries,state,cur)+renderThisWeek(entries,cur,state)+renderDSA(state);
  PHASES.forEach(function(ph){ html+=renderPhase(ph,entries,state,cur); });
  html+=renderFooter();
  return html;
}

/* ────────────────────────────────
   DOM UPDATES
────────────────────────────────── */
function updateBadge(id, state){ var el=document.getElementById('badge_'+id); if(!el) return; var m=statusMeta(state.checkins[id].status); el.className='badge '+m.cls; el.textContent=m.label; }
function updatePhaseProg(pid, entries, state){ var p=calcPhase(pid,entries,state); var f=document.getElementById('phasefill_'+pid),t=document.getElementById('phasetext_'+pid); if(f)f.style.width=pct(p.done,p.total)+'%'; if(t)t.textContent=p.done+'/'+p.total+' tasks'; }
function updateOverallProg(entries, state){ var p=calcOverall(entries,state); var f=document.getElementById('overallfill'),t=document.getElementById('overalltext'); if(f)f.style.width=pct(p.done,p.total)+'%'; if(t)t.textContent=p.done+'/'+p.total+' \u2022 '+pct(p.done,p.total)+'%'; }
function updateEntryUI(id, entries, state){ var el=document.getElementById('taskprog_'+id); if(el){var p=calcEntry(id,state);el.textContent=p.done+'/'+p.total+' tasks done';} var pid=phaseForEntry(id,entries); if(pid)updatePhaseProg(pid,entries,state); updateOverallProg(entries,state); }
function updateLCUI(state){ var i=document.getElementById('lcinput'),f=document.getElementById('lcfill'); if(i)i.value=state.leetcode; if(f)f.style.width=pct(state.leetcode,120)+'%'; }
function updateHRUI(state){ var i=document.getElementById('hrinput'),f=document.getElementById('hrfill'); if(i)i.value=state.hackerrank; if(f)f.style.width=pct(state.hackerrank,40)+'%'; }
function showSaved(id){ var el=document.getElementById('savedmsg_'+id); if(!el)return; el.textContent='Saved \u2713'; el.classList.add('show'); setTimeout(function(){el.classList.remove('show');},2200); }
function setStatus(text){ var el=document.getElementById('savestatus'); if(el)el.textContent=text; }

/* ────────────────────────────────
   PERSISTENCE  (localStorage)
────────────────────────────────── */
var saveTimer=null;
function doSave(){ setStatus('Saving\u2026'); try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); setStatus('Saved'); }catch(e){ setStatus('Save failed \u2014 storage full?'); } }
function scheduleSave(now){ if(saveTimer){clearTimeout(saveTimer);saveTimer=null;} if(now){doSave();return;} setStatus('Saving\u2026'); saveTimer=setTimeout(doSave,700); }
function resetProgress(entries){ state=defaultState(); try{localStorage.removeItem(STORAGE_KEY);}catch(e){} render(entries); setStatus('Reset'); }

/* ────────────────────────────────
   EVENTS
────────────────────────────────── */
var appEl=null, entries=null, state=null;

function handleClick(el, entriesArg){
  if(!el||!el.getAttribute) return;
  var action=el.getAttribute('data-action');
  if(!action) return;
  if(action==='toggle-entry'){
    var id=el.getAttribute('data-entry'), c=document.getElementById('entry_'+id);
    if(c){var o=c.classList.toggle('open'); el.setAttribute('aria-expanded',o?'true':'false');}
  } else if(action==='toggle-exit'){
    var pid=el.getAttribute('data-phase'), p=document.getElementById('exitpanel_'+pid);
    if(p){var op=p.classList.toggle('open'); el.setAttribute('aria-expanded',op?'true':'false');}
  } else if(action==='jump'){
    var eid=el.getAttribute('data-entry'), tgt=document.getElementById('entry_'+eid);
    if(tgt){tgt.classList.add('open'); tgt.scrollIntoView({behavior:'smooth',block:'start'});}
  } else if(action==='status'){
    var eId=el.getAttribute('data-entry'), sv=el.getAttribute('data-status');
    state.checkins[eId].status=(state.checkins[eId].status===sv)?null:sv;
    var grp=el.parentElement; if(grp)Array.prototype.forEach.call(grp.children,function(b){b.classList.remove('active');}); if(state.checkins[eId].status===sv)el.classList.add('active');
    updateBadge(eId,state); scheduleSave();
  } else if(action==='save-checkin'){
    var eId2=el.getAttribute('data-entry'), ne=document.getElementById('notes_'+eId2);
    state.checkins[eId2].notes=ne?ne.value:''; state.checkins[eId2].savedAt=new Date().toISOString();
    showSaved(eId2); scheduleSave(true);
  } else if(action==='lc-inc'||action==='lc-dec'){
    state.leetcode=Math.max(0,state.leetcode+(action==='lc-inc'?1:-1)); updateLCUI(state); scheduleSave();
  } else if(action==='hr-inc'||action==='hr-dec'){
    state.hackerrank=Math.max(0,state.hackerrank+(action==='hr-inc'?1:-1)); updateHRUI(state); scheduleSave();
  } else if(action==='reset'){
    if(window.confirm('Reset all saved progress? This cannot be undone.')) resetProgress(entriesArg);
  }
}

function attachEvents(entriesArg){
  appEl.addEventListener('click',function(e){handleClick(e.target.closest('[data-action]'),entriesArg);});
  appEl.addEventListener('keydown',function(e){
    if(e.key!=='Enter'&&e.key!==' ') return;
    var el=e.target.closest('[data-action="toggle-entry"],[data-action="toggle-exit"]');
    if(el){e.preventDefault();handleClick(el,entriesArg);}
  });
  appEl.addEventListener('change',function(e){
    var t=e.target; if(!t.matches) return;
    if(t.matches('input[type="checkbox"][data-action="task"]')){
      var eid=t.getAttribute('data-entry'), idx=parseInt(t.getAttribute('data-idx'),10);
      state.tasks[eid][idx]=t.checked; updateEntryUI(eid,entriesArg,state); scheduleSave();
    } else if(t.matches('input[type="checkbox"][data-action="exit"]')){
      state.phaseExit[t.getAttribute('data-phase')][parseInt(t.getAttribute('data-idx'),10)]=t.checked; scheduleSave();
    } else if(t.id==='lcinput'){
      var v=parseInt(t.value,10); state.leetcode=isNaN(v)||v<0?0:v; updateLCUI(state); scheduleSave();
    } else if(t.id==='hrinput'){
      var v2=parseInt(t.value,10); state.hackerrank=isNaN(v2)||v2<0?0:v2; updateHRUI(state); scheduleSave();
    }
  });
  appEl.addEventListener('input',function(e){
    var t=e.target;
    if(t.matches&&t.matches('textarea[data-action="notes"]')){ state.checkins[t.getAttribute('data-entry')].notes=t.value; scheduleSave(); }
  });
}

function render(entriesArg){ appEl.innerHTML=renderApp(entriesArg,state); }

function init(){
  appEl=document.getElementById('app');
  entries=buildSchedule();
  state=defaultState();
  try{ var s=localStorage.getItem(STORAGE_KEY); if(s)state=hydrateState(JSON.parse(s)); }catch(e){ console.warn('Could not load saved progress, starting fresh.',e); }
  render(entries);
  attachEvents(entries);
  setStatus('Loaded');
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
</script>
</body>
</html>
